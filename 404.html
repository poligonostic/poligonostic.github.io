<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Voice Ocean (Mic Only)</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  background: radial-gradient(circle at top, #020414, #000);
  color: white;
  font-family: Arial;
  display: flex;
  flex-direction: column;
  align-items: center;
}

h1 { margin: 18px; }

.panel {
  width: 380px;
  padding: 14px;
  border-radius: 14px;
  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(10px);
}

button {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  margin-top: 8px;
  background: #3498db;
  color: white;
  font-size: 14px;
}

canvas {
  margin-top: 14px;
  border-radius: 14px;
  background: black;
}
</style>
</head>

<body>

<h1>🎤🌊 Voice Ocean (Mic Only)</h1>

<div class="panel">
<button id="start">Start Microphone Ocean</button>
<p style="font-size:12px;opacity:0.7">
⚠️ Requires microphone access
</p>
</div>

<canvas id="c" width="380" height="200"></canvas>

<script>
const canvas = document.getElementById("c");
const g = canvas.getContext("2d");

let audioCtx, analyser, data;

let boatX = 190;
let running = false;

const stars = Array.from({length: 90}, () => ({
  x: Math.random(),
  y: Math.random() * 0.45,
  r: Math.random() * 1.5 + 0.2,
  t: Math.random() * 100
}));

const smoothed = new Array(128).fill(0);
let waveY = [];

let keys = {};
window.addEventListener("keydown", e => keys[e.key] = true);
window.addEventListener("keyup", e => keys[e.key] = false);

// 🎤 MIC IS REQUIRED
async function initMicOnly() {
  const stream = await navigator.mediaDevices.getUserMedia({ audio: true });

  audioCtx = new AudioContext();
  const source = audioCtx.createMediaStreamSource(stream);

  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 256;
  data = new Uint8Array(analyser.frequencyBinCount);

  source.connect(analyser);
}

function micLevel() {
  analyser.getByteFrequencyData(data);

  let sum = 0;
  for (let v of data) sum += v;

  return sum / data.length / 128; // 0–1
}

function draw() {
  requestAnimationFrame(draw);

  if (!analyser) return;

  const mic = micLevel();

  // background fade
  g.fillStyle = "rgba(0,0,10,0.25)";
  g.fillRect(0,0,canvas.width,canvas.height);

  const skyH = canvas.height * 0.5;

  // 🌟 stars (sky only)
  for (let s of stars) {
    const tw = Math.sin(Date.now()*0.002 + s.t)*0.5+0.5;

    g.fillStyle = `rgba(255,255,255,${0.3 + tw*0.7})`;
    g.beginPath();
    g.arc(s.x*canvas.width, s.y*skyH, s.r, 0, Math.PI*2);
    g.fill();
  }

  analyser.getByteFrequencyData(data);

  // smooth mic-driven wave
  for (let i = 0; i < data.length; i++) {
    smoothed[i] = smoothed[i]*0.8 + data[i]*0.2;
  }

  const step = canvas.width / data.length;

  const waveStrength = 30 + mic * 150; // 🎤 voice controls ocean

  waveY = [];

  // 🌊 wave
  g.beginPath();
  g.strokeStyle = "#00d9ff";
  g.lineWidth = 2;
  g.shadowBlur = 10;
  g.shadowColor = "#00d9ff";

  for (let i = 0; i < data.length; i++) {
    let x = i * step;
    let y = skyH + (smoothed[i] / 255) * waveStrength;

    waveY[i] = y;

    if (i === 0) g.moveTo(x,y);
    else g.lineTo(x,y);
  }

  g.stroke();

  // 🚤 boat control
  if (keys["ArrowLeft"]) boatX -= 3;
  if (keys["ArrowRight"]) boatX += 3;

  boatX = Math.max(0, Math.min(canvas.width, boatX));

  const idx = Math.floor((boatX / canvas.width) * data.length);

  const by = waveY[idx] || skyH;
  const prev = waveY[idx-1] || by;
  const next = waveY[idx+1] || by;

  const angle = Math.atan2(next - prev, step * 2);

  g.save();
  g.translate(boatX, by);
  g.rotate(angle);

  g.fillStyle = "white";
  g.beginPath();
  g.moveTo(-10,5);
  g.lineTo(10,5);
  g.lineTo(6,-3);
  g.lineTo(-6,-3);
  g.closePath();
  g.fill();

  g.beginPath();
  g.moveTo(0,-3);
  g.lineTo(0,-15);
  g.stroke();

  g.restore();
}

// start (MIC REQUIRED)
document.getElementById("start").onclick = async () => {
  try {
    await initMicOnly();
    await audioCtx.resume();
    running = true;
    draw();
  } catch (e) {
    alert("Microphone is required to run this experience.");
  }
};
</script>

</body>
</html>
