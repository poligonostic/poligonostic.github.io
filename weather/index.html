<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Poligonostic Weather – Viewer</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
  body {
    margin: 0;
    background: #0b1226;
    color: #e6ecff;
    font-family: 'Inter', sans-serif;
    display: flex;
  }

  /* Sidebar */
  .sidebar {
    width: 260px;
    background: #0f1a33;
    border-right: 2px solid #4ea3ff;
    padding: 30px 20px;
    box-sizing: border-box;
    height: 100vh;
  }

  .sidebar h2 {
    font-family: 'Great Vibes', cursive;
    font-size: 38px;
    color: #4ea3ff;
    margin-top: 0;
    margin-bottom: 20px;
  }

  .sidebar a {
    display: block;
    color: #cfe3ff;
    text-decoration: none;
    padding: 12px 0;
    font-size: 18px;
    border-bottom: 1px solid #1f2b4d;
    transition: 0.2s;
  }

  .sidebar a:hover {
    color: #4ea3ff;
    padding-left: 6px;
  }

  /* Main layout */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  /* Unit toggle */
  .unit-toggle {
    position: absolute;
    top: 20px;
    right: 30px;
    z-index: 4;
    padding: 10px 18px;
    border-radius: 30px;
    border: 2px solid #4ea3ff;
    background: #0f1a33;
    color: #e6ecff;
    font-size: 15px;
    cursor: pointer;
    transition: 0.2s;
  }

  .unit-toggle:hover {
    background: #14254a;
  }

  /* Top animated header */
  .weather-header {
    position: relative;
    height: 45vh;
    overflow: hidden;
    background: #111b38;
  }

  .weather-bg {
    position: absolute;
    inset: 0;
    overflow: hidden;
    z-index: 1;
  }

  .blur-overlay {
    position: absolute;
    inset: 0;
    backdrop-filter: blur(4px);
    background: rgba(11,18,38,0.35);
    z-index: 2;
  }

  .header-content {
    position: relative;
    z-index: 3;
    padding: 20px 40px;
  }

  .title {
    font-family: 'Great Vibes', cursive;
    font-size: 60px;
    color: #4ea3ff;
    margin: 0;
  }

  .location-name {
    font-size: 26px;
    color: #9ccaff;
    margin-top: 4px;
  }

  .header-row {
    margin-top: 25px;
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    align-items: center;
  }

  .search-box {
    flex: 1;
    min-width: 240px;
    padding: 14px 20px;
    border-radius: 40px;
    border: 2px solid #4ea3ff;
    background: #0f1a33;
    color: #e6ecff;
    font-size: 18px;
    outline: none;
    box-shadow: 0 0 10px rgba(78,163,255,0.2);
  }

  .btn {
    padding: 12px 20px;
    border-radius: 30px;
    border: 2px solid #4ea3ff;
    background: #0f1a33;
    color: #e6ecff;
    font-size: 16px;
    cursor: pointer;
    transition: 0.2s;
  }

  .btn:hover {
    background: #14254a;
  }

  /* Animated elements */
  .sun {
    position: absolute;
    width: 140px;
    height: 140px;
    top: 10%;
    left: 10%;
    border-radius: 50%;
    background: radial-gradient(circle, #FFD700, #FFA500);
    box-shadow: 0 0 50px rgba(255,215,0,0.5);
  }

  .cloud {
    position: absolute;
    background: #fff;
    border-radius: 50%;
    width: 220px;
    height: 70px;
    animation: moveClouds 30s linear infinite;
    opacity: 0.9;
  }

  .cloud::before,
  .cloud::after {
    content: '';
    position: absolute;
    background: #fff;
    border-radius: 50%;
  }

  .cloud::before {
    width: 120px;
    height: 120px;
    top: -60px;
    left: 50px;
  }

  .cloud::after {
    width: 140px;
    height: 140px;
    top: -70px;
    left: 110px;
  }

  .rain,
  .snow {
    position: absolute;
    inset: 0;
    pointer-events: none;
  }

  .raindrop {
    position: absolute;
    width: 2px;
    height: 14px;
    background: rgba(120,180,255,0.7);
    animation: fall 1s linear infinite;
  }

  .snowflake {
    position: absolute;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: rgba(255,255,255,0.9);
    animation: snowFall 4s linear infinite;
  }

  .flash {
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0.2);
    opacity: 0;
    animation: flashStorm 3s linear infinite;
  }

  @keyframes moveClouds {
    0% { transform: translateX(-120%); }
    100% { transform: translateX(120%); }
  }

  @keyframes fall {
    0% { top: -10px; }
    100% { top: 100%; }
  }

  @keyframes snowFall {
    0% { top: -10px; transform: translateX(0); }
    100% { top: 100%; transform: translateX(20px); }
  }

  @keyframes flashStorm {
    0%, 80%, 100% { opacity: 0; }
    40% { opacity: 1; }
  }

  /* Bottom cards */
  .weather-body {
    flex: 1;
    padding: 40px 50px;
    overflow-y: auto;
  }

  .cards-row {
    display: flex;
    flex-wrap: wrap;
    gap: 25px;
  }

  .card {
    background: rgba(17,27,56,0.9);
    border: 2px solid #4ea3ff;
    border-radius: 16px;
    padding: 25px;
    min-width: 280px;
    flex: 1;
    box-shadow: 0 0 20px rgba(78,163,255,0.15);
  }

  .card h3 {
    margin-top: 0;
    font-size: 22px;
    color: #4ea3ff;
  }

  .forecast-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 16px;
    margin-top: 10px;
  }

  .forecast-item {
    background: #111b38;
    border-radius: 12px;
    padding: 12px 14px;
    border: 1px solid #2b3c6f;
  }

  .forecast-item strong {
    display: block;
    margin-bottom: 4px;
    color: #9ccaff;
  }
</style>
</head>

<body>

<!-- Sidebar -->
<div class="sidebar">
  <h2>Poligonostic</h2>
  <a href="/">Home</a>
  <a href="/weather/">Weather Viewer</a>
  <a href="/radar/">Live Radar</a>
  <a href="/satellite/">Satellite View</a>
  <a href="/maps/">Weather Maps</a>
  <a href="/about/">About</a>
</div>

<!-- Main -->
<div class="main">

  <!-- Unit toggle -->
  <button class="unit-toggle" onclick="toggleUnits()">Metric / Imperial</button>

  <!-- Top animated header -->
  <div class="weather-header">
    <div class="weather-bg" id="weatherBg"></div>
    <div class="blur-overlay"></div>

    <div class="header-content">
      <h1 class="title">Poligonostic Weather</h1>
      <div class="location-name" id="locationName">Loading location...</div>

      <div class="header-row">
        <input id="searchInput" class="search-box" type="text" placeholder="Search for a city...">
        <button class="btn" onclick="searchLocation()">Search</button>
        <button class="btn" onclick="findMyLocation()">Find My Location</button>
        <button class="btn fav-btn" onclick="addFavorite()">⭐ Add to Favorites</button>
      </div>
    </div>
  </div>

  <!-- Bottom cards -->
  <div class="weather-body">
    <div class="cards-row">
      <div class="card" id="currentCard">
        <h3>Current Conditions</h3>
        <p>Loading current weather...</p>
      </div>

      <div class="card">
        <h3>7-Day Forecast</h3>
        <div class="forecast-grid" id="forecastGrid">
          <p>Loading forecast...</p>
        </div>
      </div>
    </div>

    <footer>
      © 2026 Poligonostic Weather — Open data from Open‑Meteo.
    </footer>
  </div>
</div>

<script>
  let useImperial = false;

  function toF(c) { return (c * 9/5) + 32; }
  function toMPH(kmh) { return kmh / 1.609; }

  const params = new URLSearchParams(window.location.search);
  let lat = parseFloat(params.get("lat"));
  let lon = parseFloat(params.get("lon"));
  let name = params.get("name") || "";

  const locationNameEl = document.getElementById("locationName");
  const weatherBg = document.getElementById("weatherBg");
  const currentCard = document.getElementById("currentCard");
  const forecastGrid = document.getElementById("forecastGrid");

  if (isNaN(lat) || isNaN(lon)) {
    lat = 34.36;
    lon = -92.81;
    name = "Malvern, AR (default)";
  }

  locationNameEl.textContent = name || "Unknown location";
  fetchWeather(lat, lon);

  async function fetchWeather(lat, lon) {
    try {
      const url =
        "https://api.open-meteo.com/v1/forecast" +
        "?latitude=" + lat +
        "&longitude=" + lon +
        "&current_weather=true" +
        "&hourly=weathercode,temperature_2m,wind_speed_10m,wind_direction_10m" +
        "&daily=weathercode,temperature_2m_max,temperature_2m_min,wind_speed_10m_max" +
        "&timezone=auto";

      const res = await fetch(url);
      const data = await res.json();

      updateCurrent(data);
      updateForecast(data);
      updateAnimation(data);
    } catch (err) {
      console.error(err);
      currentCard.innerHTML = "<h3>Current Conditions</h3><p>Unable to load weather.</p>";
      forecastGrid.innerHTML = "<p>Unable to load forecast.</p>";
    }
  }

  function codeToText(code) {
    if (code === 0) return "Clear sky";
    if (code === 1 || code === 2) return "Mostly clear";
    if (code === 3) return "Cloudy";
    if (code >= 45 && code <= 48) return "Foggy";
    if (code >= 51 && code <= 57) return "Drizzle";
    if (code >= 61 && code <= 65) return "Rain";
    if (code >= 66 && code <= 67) return "Freezing rain";
    if (code >= 71 && code <= 75) return "Snow";
    if (code === 77) return "Snow grains";
    if (code >= 80 && code <= 82) return "Rain showers";
    if (code >= 85 && code <= 86) return "Snow showers";
    if (code >= 95 && code <= 99) return "Thunderstorm";
    return "Unknown";
  }

  function updateCurrent(data) {
    const cw = {
      weathercode: data.hourly.weathercode[0],
      temperature: data.hourly.temperature_2m[0],
      windspeed: data.hourly.wind_speed_10m[0],
      winddirection: data.hourly.wind_direction_10m[0],
      time: data.hourly.time[0]
    };

    const desc = codeToText(cw.weathercode);

    let temp = cw.temperature;
    let wind = cw.windspeed;

    if (useImperial) {
      temp = toF(temp);
      wind = toMPH(wind);
    }

    currentCard.innerHTML = `
      <h3>Current Conditions</h3>
      <p><strong>${desc}</strong></p>
      <p>Temperature: ${Math.round(temp)} °${useImperial ? "F" : "C"}</p>
      <p>Wind: ${Math.round(wind)} ${useImperial ? "mph" : "km/h"}, direction ${cw.winddirection}°</p>
      <p>Time: ${new Date(cw.time).toLocaleString()}</p>
    `;
  }

  function updateForecast(data) {
    const daily = data.daily;
    if (!daily || !daily.time) {
      forecastGrid.innerHTML = "<p>No forecast data.</p>";
      return;
    }

    forecastGrid.innerHTML = "";
    for (let i = 0; i < daily.time.length && i < 7; i++) {
      const day = new Date(daily.time[i]).toLocaleDateString([], {
        weekday: "short",
        month: "short",
        day: "numeric"
      });

      const desc = codeToText(daily.weathercode[i]);

      let tmin = daily.temperature_2m_min[i];
      let tmax = daily.temperature_2m_max[i];
      let wind = daily.wind_speed_10m_max[i];

      if (useImperial) {
        tmin = toF(tmin);
        tmax = toF(tmax);
        wind = toMPH(wind);
      }

      const item = document.createElement("div");
      item.className = "forecast-item";
      item.innerHTML = `
        <strong>${day}</strong>
        <p>${desc}</p>
        <p>${Math.round(tmin)}–${Math.round(tmax)} °${useImperial ? "F" : "C"}</p>
        <p>Wind max: ${Math.round(wind)} ${useImperial ? "mph" : "km/h"}</p>
      `;
      forecastGrid.appendChild(item);
    }
  }

  function updateAnimation(data) {
    weatherBg.innerHTML = "";
    const code = data.hourly.weathercode[0];

    if (code === 0 || code === 1 || code === 2) {
      const sun = document.createElement("div");
      sun.className = "sun";
      weatherBg.appendChild(sun);
    }

    if (code === 3 || (code >= 45 && code <= 48)) {
      for (let i = 0; i < 4; i++) {
        const cloud = document.createElement("div");
        cloud.className = "cloud";
        cloud.style.top = (10 + i * 15) + "%";
        cloud.style.left = (i * 20) + "%";
        cloud.style.animationDuration = (25 + i * 5) + "s";
        weatherBg.appendChild(cloud);
      }
    }

    if ((code >= 51 && code <= 67) || (code >= 80 && code <= 82)) {
      const rain = document.createElement("div");
      rain.className = "rain";
      for (let i = 0; i < 120; i++) {
        const drop = document.createElement("div");
        drop.className = "raindrop";
        drop.style.left = Math.random() * 100 + "%";
        drop.style.animationDuration = (0.6 + Math.random() * 0.6) + "s";
        rain.appendChild(drop);
      }
      weatherBg.appendChild(rain);
    }

    if ((code >= 71 && code <= 75) || (code >= 85 && code <= 86)) {
      const snow = document.createElement("div");
      snow.className = "snow";
      for (let i = 0; i < 80; i++) {
        const flake = document.createElement("div");
        flake.className = "snowflake";
        flake.style.left = Math.random() * 100 + "%";
        flake.style.animation
