<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Poligonostic Weather – Viewer</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
  body {
    margin: 0;
    background: #0b1226;
    color: #e6ecff;
    font-family: 'Inter', sans-serif;
    display: flex;
  }

  .sidebar {
    width: 260px;
    background: #0f1a33;
    border-right: 2px solid #4ea3ff;
    padding: 30px 20px;
    height: 100vh;
  }

  .sidebar h2 {
    font-family: 'Great Vibes', cursive;
    font-size: 38px;
    color: #4ea3ff;
    margin: 0 0 20px 0;
  }

  .sidebar a {
    display: block;
    color: #cfe3ff;
    text-decoration: none;
    padding: 12px 0;
    font-size: 18px;
    border-bottom: 1px solid #1f2b4d;
  }

  .sidebar a:hover {
    color: #4ea3ff;
    padding-left: 6px;
  }

  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  .unit-toggle {
    position: absolute;
    top: 20px;
    right: 30px;
    padding: 10px 18px;
    border-radius: 30px;
    border: 2px solid #4ea3ff;
    background: #0f1a33;
    color: #e6ecff;
    cursor: pointer;
    z-index: 10;
  }

  .weather-header {
    position: relative;
    height: 45vh;
    overflow: hidden;
    background: #111b38;
  }

  .weather-bg {
    position: absolute;
    inset: 0;
    z-index: 1;
  }

  .blur-overlay {
    position: absolute;
    inset: 0;
    backdrop-filter: blur(4px);
    background: rgba(11,18,38,0.35);
    z-index: 2;
  }

  .header-content {
    position: relative;
    z-index: 3;
    padding: 20px 40px;
  }

  .title {
    font-family: 'Great Vibes', cursive;
    font-size: 60px;
    color: #4ea3ff;
    margin: 0;
  }

  .location-name {
    font-size: 26px;
    color: #9ccaff;
    margin-top: 4px;
  }

  .header-row {
    margin-top: 25px;
    display: flex;
    gap: 12px;
  }

  .search-box {
    flex: 1;
    padding: 14px 20px;
    border-radius: 40px;
    border: 2px solid #4ea3ff;
    background: #0f1a33;
    color: #e6ecff;
    font-size: 18px;
  }

  .btn {
    padding: 12px 20px;
    border-radius: 30px;
    border: 2px solid #4ea3ff;
    background: #0f1a33;
    color: #e6ecff;
    cursor: pointer;
  }

  .weather-body {
    flex: 1;
    padding: 40px 50px;
    overflow-y: auto;
  }

  .cards-row {
    display: flex;
    gap: 25px;
    flex-wrap: wrap;
  }

  .card {
    background: rgba(17,27,56,0.9);
    border: 2px solid #4ea3ff;
    border-radius: 16px;
    padding: 25px;
    min-width: 280px;
    flex: 1;
  }

  .forecast-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 16px;
  }

  .forecast-item {
    background: #111b38;
    border-radius: 12px;
    padding: 12px 14px;
    border: 1px solid #2b3c6f;
  }

  /* Animations */
  .sun {
    position: absolute;
    width: 140px;
    height: 140px;
    top: 10%;
    left: 10%;
    border-radius: 50%;
    background: radial-gradient(circle, #FFD700, #FFA500);
    box-shadow: 0 0 50px rgba(255,215,0,0.5);
  }

  .cloud {
    position: absolute;
    background: #fff;
    border-radius: 50%;
    width: 220px;
    height: 70px;
    animation: moveClouds 30s linear infinite;
  }

  @keyframes moveClouds {
    0% { transform: translateX(-120%); }
    100% { transform: translateX(120%); }
  }

  .rain .raindrop {
    position: absolute;
    width: 2px;
    height: 14px;
    background: rgba(120,180,255,0.7);
    animation: fall 1s linear infinite;
  }

  @keyframes fall {
    0% { top: -10px; }
    100% { top: 100%; }
  }

  .snow .snowflake {
    position: absolute;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: rgba(255,255,255,0.9);
    animation: snowFall 4s linear infinite;
  }

  @keyframes snowFall {
    0% { top: -10px; }
    100% { top: 100%; transform: translateX(20px); }
  }

  .flash {
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0.2);
    opacity: 0;
    animation: flashStorm 3s linear infinite;
  }

  @keyframes flashStorm {
    0%, 80%, 100% { opacity: 0; }
    40% { opacity: 1; }
  }
</style>
</head>

<body>

<div class="sidebar">
  <h2>Poligonostic</h2>
  <a href="/">Home</a>
  <a href="/weather/">Weather Viewer</a>
  <a href="/radar/">Live Radar</a>
  <a href="/satellite/">Satellite View</a>
  <a href="/maps/">Weather Maps</a>
  <a href="/about/">About</a>
</div>

<div class="main">

<button class="unit-toggle" onclick="toggleUnits()">Metric / Imperial</button>

<div class="weather-header">
  <div class="weather-bg" id="weatherBg"></div>
  <div class="blur-overlay"></div>

  <div class="header-content">
    <h1 class="title">Poligonostic Weather</h1>
    <div class="location-name" id="locationName">Loading...</div>

    <div class="header-row">
      <input id="searchInput" class="search-box" type="text" placeholder="Search for a city...">
      <button class="btn" onclick="searchLocation()">Search</button>
      <button class="btn" onclick="findMyLocation()">Find My Location</button>
      <button class="btn" onclick="addFavorite()">⭐ Add to Favorites</button>
    </div>
  </div>
</div>

<div class="weather-body">
  <div class="cards-row">
    <div class="card" id="currentCard">
      <h3>Current Conditions</h3>
      <p>Loading...</p>
    </div>

    <div class="card">
      <h3>7-Day Forecast</h3>
      <div class="forecast-grid" id="forecastGrid">
        <p>Loading...</p>
      </div>
    </div>
  </div>
</div>

</div>

<script>
let useImperial = false;

// URL READER — FINAL FIX
const params = new URLSearchParams(window.location.search);

const lat = Number(params.get("lat"));
const lon = Number(params.get("lon"));
const name = params.get("name");

if (!lat || !lon || !name) {
  document.getElementById("locationName").textContent = "Invalid location";
  throw new Error("Missing URL parameters");
}

document.getElementById("locationName").textContent = decodeURIComponent(name);

// WEATHER FETCH — FINAL FIX
async function fetchWeather(lat, lon) {
  const url =
    "https://api.open-meteo.com/v1/forecast" +
    "?latitude=" + lat +
    "&longitude=" + lon +
    "&current_weather=true" +
    "&hourly=weathercode,temperature_2m,wind_speed_10m,wind_direction_10m" +
    "&daily=weathercode,temperature_2m_max,temperature_2m_min,wind_speed_10m_max" +
    "&timezone=auto";

  const res = await fetch(url);
  const data = await res.json();

  updateCurrent(data);
  updateForecast(data);
  updateAnimation(data);
}

fetchWeather(lat, lon);

// UNIT TOGGLE
function toggleUnits() {
  useImperial = !useImperial;
  fetchWeather(lat, lon);
}

// WEATHER CODE → TEXT
function codeToText(code) {
  if (code === 0) return "Clear sky";
  if (code <= 2) return "Mostly clear";
  if (code === 3) return "Cloudy";
  if (code <= 48) return "Foggy";
  if (code <= 57) return "Drizzle";
  if (code <= 65) return "Rain";
  if (code <= 67) return "Freezing rain";
  if (code <= 75) return "Snow";
  if (code === 77) return "Snow grains";
  if (code <= 82) return "Rain showers";
  if (code <= 86) return "Snow showers";
  if (code <= 99) return "Thunderstorm";
  return "Unknown";
}

// CURRENT CONDITIONS
function updateCurrent(data) {
  const cw = {
    weathercode: data.hourly.weathercode[0],
    temperature: data.hourly.temperature_2m[0],
    windspeed: data.hourly.wind_speed_10m[0],
    winddirection: data.hourly.wind_direction_10m[0],
    time: data.hourly.time[0]
  };

  let temp = cw.temperature;
  let wind = cw.windspeed;

  if (useImperial) {
    temp = temp * 9/5 + 32;
    wind = wind / 1.609;
  }

  document.getElementById("currentCard").innerHTML = `
    <h3>Current Conditions</h3>
    <p><strong>${codeToText(cw.weathercode)}</strong></p>
    <p>Temperature: ${Math.round(temp)} °${useImperial ? "F" : "C"}</p>
    <p>Wind: ${Math.round(wind)} ${useImperial ? "mph" : "km/h"}</p>
    <p>Direction: ${cw.winddirection}°</p>
    <p>Time: ${new Date(cw.time).toLocaleString()}</p>
  `;
}

// FORECAST
function updateForecast(data) {
  const daily = data.daily;
  const grid = document.getElementById("forecastGrid");
  grid.innerHTML = "";

  for (let i = 0; i < 7; i++) {
    let tmin = daily.temperature_2m_min[i];
    let tmax = daily.temperature_2m_max[i];
    let wind = daily.wind_speed_10m_max[i];

    if (useImperial) {
      tmin = tmin * 9/5 + 32;
      tmax = tmax * 9/5 + 32;
      wind = wind / 1.609;
    }

    const item = document.createElement("div");
    item.className = "forecast-item";
    item.innerHTML = `
      <strong>${new Date(daily.time[i]).toLocaleDateString()}</strong>
      <p>${codeToText(daily.weathercode[i])}</p>
      <p>${Math.round(tmin)}–${Math.round(tmax)} °${useImperial ? "F" : "C"}</p>
      <p>Wind max: ${Math.round(wind)} ${useImperial ? "mph" : "km/h"}</p>
    `;
    grid.appendChild(item);
  }
}

// ANIMATION
function updateAnimation(data) {
  const bg = document.getElementById("weatherBg");
  bg.innerHTML = "";

  const code = data.hourly.weathercode[0];

  if (code <= 2) {
    bg.innerHTML = `<div class="sun"></div>`;
  }

  if (code === 3 || (code >= 45 && code <= 48)) {
    for (let i = 0; i < 4; i++) {
      const cloud = document.createElement("div");
      cloud.className = "cloud";
      cloud.style.top = `${10 + i * 15}%`;
      cloud.style.left = `${i * 20}%`;
      cloud.style.animationDuration = `${25 + i * 5}s`;
      bg.appendChild(cloud);
    }
  }

  if ((code >= 51 && code <= 67) || (code >= 80 && code <= 82)) {
    const rain = document.createElement("div");
    rain.className = "rain";
    for (let i = 0; i < 120; i++) {
      const drop = document.createElement("div");
      drop.className = "raindrop";
      drop.style.left = Math.random() * 100 + "%";
      drop.style.animationDuration = (0.6 + Math.random() * 0.6) + "s";
      rain.appendChild(drop);
    }
    bg.appendChild(rain);
  }

  if ((code >= 71 && code <= 75) || (code >= 85 && code <= 86)) {
    const snow = document.createElement("div");
    snow.className = "snow";
    for (let i = 0; i < 80; i++) {
      const flake = document.createElement("div");
      flake.className = "snowflake";
      flake.style.left = Math.random() * 100 + "%";
      flake.style.animationDuration = (3 + Math.random() * 3) + "s";
      snow.appendChild(flake);
    }
    bg.appendChild(snow);
  }

  if (code >= 95 && code <= 99) {
    bg.innerHTML += `<div class="flash"></div>`;
  }
}

// SEARCH
async function searchLocation() {
  const q = document.getElementById("searchInput").value.trim();
  if (!q) return alert("Type a city name");

  const res = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(q)}&count=1`);
  const data = await res.json();

  if (!data.results || data.results.length === 0) {
    alert("Location not found");
    return;
  }

  const loc = data.results[0];
  window.location.href = `/weather/?lat=${loc.latitude}&lon=${loc.longitude}&name=${encodeURIComponent(loc.name)}`;
}

// MAP REDIRECT
function findMyLocation() {
  window.location.href = "/weather/map.html";
}

// FAVORITES
function addFavorite() {
  const favs = JSON.parse(localStorage.getItem("favorites") || "[]");
  favs.push({ lat, lon, name });
  localStorage.setItem("favorites", JSON.stringify(favs));
  alert("Added to favorites");
}
</script>

</body>
</html>
