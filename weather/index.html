<html lang="en"><head>
<meta charset="UTF-8">
<title>Poligonostic Weather – Viewer</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
  body {
    margin: 0;
    background: #0b1226;
    color: #e6ecff;
    font-family: 'Inter', sans-serif;
    display: flex;
  }

  .sidebar {
    width: 260px;
    background: #0f1a33;
    border-right: 2px solid #4ea3ff;
    padding: 30px 20px;
    height: 100vh;
    box-sizing: border-box;
  }

  .sidebar h2 {
    font-family: 'Great Vibes', cursive;
    font-size: 38px;
    color: #4ea3ff;
    margin: 0 0 20px 0;
  }

  .sidebar a {
    display: block;
    color: #cfe3ff;
    text-decoration: none;
    padding: 12px 0;
    font-size: 18px;
    border-bottom: 1px solid #1f2b4d;
  }

  .sidebar a:hover {
    color: #4ea3ff;
    padding-left: 6px;
  }

  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  .unit-toggle {
    position: absolute;
    top: 20px;
    right: 30px;
    padding: 10px 18px;
    border-radius: 30px;
    border: 2px solid #4ea3ff;
    background: #0f1a33;
    color: #e6ecff;
    cursor: pointer;
  }

  .weather-header {
    position: relative;
    height: 45vh;
    overflow: hidden;
    background: #111b38;
  }

  .weather-bg {
    position: absolute;
    inset: 0;
    z-index: 1;
  }

  .blur-overlay {
    position: absolute;
    inset: 0;
    backdrop-filter: blur(4px);
    background: rgba(11,18,38,0.35);
    z-index: 2;
  }

  .header-content {
    position: relative;
    z-index: 3;
    padding: 20px 40px;
  }

  .title {
    font-family: 'Great Vibes', cursive;
    font-size: 60px;
    color: #4ea3ff;
  }

  .location-name {
    font-size: 26px;
    color: #9ccaff;
  }

  .cards-row {
    display: flex;
    gap: 25px;
    flex-wrap: wrap;
    padding: 40px;
  }

  .card {
    background: rgba(17,27,56,0.9);
    border: 2px solid #4ea3ff;
    border-radius: 16px;
    padding: 25px;
    flex: 1;
    min-width: 280px;
  }

  .forecast-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 16px;
  }

  .forecast-item {
    background: #111b38;
    border-radius: 12px;
    padding: 12px;
    border: 1px solid #2b3c6f;
  }

  .sun { width:160px;height:160px;border-radius:50%;
    background: radial-gradient(circle,#fff9a6,#ffd700,#ffae00);
    position:absolute;top:10%;left:10%;
  }

  .cloud, .raindrop, .snowflake, .flash {
    position:absolute;
  }
</style>
</head>

<body>

<div class="sidebar">
  <h2>Poligonostic</h2>
  <a href="/">Home</a>
  <a href="/weather/">Weather Viewer</a>
</div>

<div class="main">

<button class="unit-toggle" onclick="toggleUnits()">Metric / Imperial</button>

<div class="weather-header">
  <div class="weather-bg" id="weatherBg"></div>
  <div class="blur-overlay"></div>

  <div class="header-content">
    <div class="title">Poligonostic Weather</div>
    <div class="location-name" id="locationName">Loading...</div>
  </div>
</div>

<div class="cards-row">
  <div class="card" id="currentCard">Loading...</div>
  <div class="card">
    <div class="forecast-grid" id="forecastGrid"></div>
  </div>
</div>

</div>

<script>
let useImperial = false;

const params = new URLSearchParams(window.location.search);
const lat = Number(params.get("lat"));
const lon = Number(params.get("lon"));
const name = params.get("name");

const locationNameEl = document.getElementById("locationName");
const currentCard = document.getElementById("currentCard");
const forecastGrid = document.getElementById("forecastGrid");
const weatherBg = document.getElementById("weatherBg");

locationNameEl.textContent = decodeURIComponent(name || "Unknown");

async function fetchWeather(lat, lon) {
  try {
    const pointRes = await fetch(`https://api.weather.gov/points/${lat},${lon}`);
    const pointData = await pointRes.json();

    const hourlyUrl =
      pointData?.properties?.forecastHourly ||
      pointData?.properties?.forecast;

    if (!hourlyUrl) throw new Error("No forecast endpoint");

    const res = await fetch(hourlyUrl);
    const data = await res.json();

    const periods = data.properties?.periods || [];

    const toCode = t => {
      t = (t || "").toLowerCase();
      if (t.includes("thunder")) return 95;
      if (t.includes("snow")) return 73;
      if (t.includes("rain")) return 61;
      if (t.includes("cloud")) return 3;
      if (t.includes("clear")) return 0;
      return 1;
    };

    let hourly = {
      weathercode: [],
      temperature_2m: [],
      wind_speed_10m: [],
      wind_direction_10m: [],
      time: []
    };

    let daily = { time:[], weathercode:[], temperature_2m_min:[], temperature_2m_max:[], wind_speed_10m_max:[] };
    let map = {};

    periods.forEach(p => {
      let temp = p.temperature;
      if (p.temperatureUnit === "C") temp = temp * 9/5 + 32;

      hourly.weathercode.push(toCode(p.shortForecast));
      hourly.temperature_2m.push(temp);
      hourly.wind_speed_10m.push(parseFloat(p.windSpeed) || 0);
      hourly.wind_direction_10m.push(0);
      hourly.time.push(p.startTime);

      const d = p.startTime.split("T")[0];
      if (!map[d]) map[d] = {min:999,max:-999,code:toCode(p.shortForecast),wind:0};

      map[d].min = Math.min(map[d].min, temp);
      map[d].max = Math.max(map[d].max, temp);
      map[d].wind = Math.max(map[d].wind, parseFloat(p.windSpeed) || 0);
    });

    Object.keys(map).slice(0,7).forEach(d=>{
      daily.time.push(d);
      daily.weathercode.push(map[d].code);
      daily.temperature_2m_min.push(map[d].min);
      daily.temperature_2m_max.push(map[d].max);
      daily.wind_speed_10m_max.push(map[d].wind);
    });

    updateCurrent({hourly});
    updateForecast({daily});
    updateAnimation({hourly});

  } catch (e) {
    console.error(e);
    currentCard.textContent = "Unable to load weather";
  }
}

fetchWeather(lat, lon);

function toggleUnits(){
  useImperial = !useImperial;
  fetchWeather(lat, lon);
}

function updateCurrent(data){
  const w = data.hourly;

  let t = w.temperature_2m[0];
  let wind = w.wind_speed_10m[0];

  if (useImperial){
    wind = wind / 1.609;
  }

  currentCard.innerHTML = `
    <h3>Current</h3>
    <p>${Math.round(t)}° ${useImperial ? "F" : "C"}</p>
    <p>Wind ${Math.round(wind)}</p>
  `;
}

function updateForecast(data){
  forecastGrid.innerHTML = "";

  data.daily.time.forEach((d,i)=>{
    const el = document.createElement("div");
    el.className = "forecast-item";
    el.innerHTML = `
      <strong>${d}</strong>
      <p>${Math.round(data.daily.temperature_2m_min[i])}–${Math.round(data.daily.temperature_2m_max[i])}</p>
    `;
    forecastGrid.appendChild(el);
  });
}

function updateAnimation(){}

</script>

</body></html>
