<html lang="en"><head>
<meta charset="UTF-8">
<title>Poligonostic Weather – Viewer</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
  body {
    margin: 0;
    background: #0b1226;
    color: #e6ecff;
    font-family: 'Inter', sans-serif;
    display: flex;
  }

  .sidebar {
    width: 260px;
    background: #0f1a33;
    border-right: 2px solid #4ea3ff;
    padding: 30px 20px;
    height: 100vh;
    box-sizing: border-box;
  }

  .sidebar h2 {
    font-family: 'Great Vibes', cursive;
    font-size: 38px;
    color: #4ea3ff;
    margin: 0 0 20px 0;
  }

  .sidebar a {
    display: block;
    color: #cfe3ff;
    text-decoration: none;
    padding: 12px 0;
    font-size: 18px;
    border-bottom: 1px solid #1f2b4d;
    transition: 0.2s;
  }

  .sidebar a:hover {
    color: #4ea3ff;
    padding-left: 6px;
  }

  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  .unit-toggle {
    position: absolute;
    top: 20px;
    right: 30px;
    padding: 10px 18px;
    border-radius: 30px;
    border: 2px solid #4ea3ff;
    background: #0f1a33;
    color: #e6ecff;
    cursor: pointer;
    z-index: 10;
    font-size: 14px;
  }

  .unit-toggle:hover {
    background: #14254a;
  }

  .weather-header {
    position: relative;
    height: 45vh;
    overflow: hidden;
    background: #111b38;
  }

  .weather-bg {
    position: absolute;
    inset: 0;
    z-index: 1;
  }

  .blur-overlay {
    position: absolute;
    inset: 0;
    backdrop-filter: blur(4px);
    background: rgba(11,18,38,0.35);
    z-index: 2;
  }

  .header-content {
    position: relative;
    z-index: 3;
    padding: 20px 40px;
  }

  .title {
    font-family: 'Great Vibes', cursive;
    font-size: 60px;
    color: #4ea3ff;
    margin: 0;
  }

  .location-name {
    font-size: 26px;
    color: #9ccaff;
    margin-top: 4px;
  }

  .header-row {
    margin-top: 25px;
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }

  .search-box {
    flex: 1;
    min-width: 240px;
    padding: 14px 20px;
    border-radius: 40px;
    border: 2px solid #4ea3ff;
    background: #0f1a33;
    color: #e6ecff;
    font-size: 18px;
    outline: none;
    box-shadow: 0 0 10px rgba(78,163,255,0.2);
  }

  .btn {
    padding: 12px 20px;
    border-radius: 30px;
    border: 2px solid #4ea3ff;
    background: #0f1a33;
    color: #e6ecff;
    font-size: 16px;
    cursor: pointer;
    transition: 0.2s;
  }

  .btn:hover {
    background: #14254a;
  }

  .weather-body {
    flex: 1;
    padding: 40px 50px;
    overflow-y: auto;
    box-sizing: border-box;
  }

  .cards-row {
    display: flex;
    gap: 25px;
    flex-wrap: wrap;
  }

  .card {
    background: rgba(17,27,56,0.9);
    border: 2px solid #4ea3ff;
    border-radius: 16px;
    padding: 25px;
    min-width: 280px;
    flex: 1;
    box-sizing: border-box;
    box-shadow: 0 0 20px rgba(78,163,255,0.15);
  }

  .card h3 {
    margin-top: 0;
    font-size: 22px;
    color: #4ea3ff;
  }

  .forecast-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 16px;
    margin-top: 10px;
    overflow: hidden;
  }

  .forecast-item {
    background: #111b38;
    border-radius: 12px;
    padding: 12px 14px;
    border: 1px solid #2b3c6f;
  }

  .forecast-item strong {
    display: block;
    margin-bottom: 4px;
    color: #9ccaff;
  }

  footer {
    margin-top: 25px;
    font-size: 13px;
    color: #7f93c2;
  }

  *::-webkit-scrollbar {
    display: none;
  }

  .sun {
    position: absolute;
    width: 160px;
    height: 160px;
    top: 10%;
    left: 10%;
    border-radius: 50%;
    background: radial-gradient(circle, #fff9a6, #ffd700, #ffae00);
    box-shadow: 0 0 60px rgba(255,200,0,0.7);
    animation: sunPulse 6s ease-in-out infinite;
  }

  @keyframes sunPulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.08); }
  }

  .cloud {
    position: absolute;
    background: #fff;
    border-radius: 50%;
    width: 180px;
    height: 60px;
    opacity: 0.9;
    filter: blur(1px);
    animation: cloudDrift linear infinite;
  }

  .cloud::before,
  .cloud::after {
    content: '';
    position: absolute;
    background: #fff;
    border-radius: 50%;
  }

  .cloud::before {
    width: 120px;
    height: 120px;
    top: -40px;
    left: 20px;
  }

  .cloud::after {
    width: 140px;
    height: 100px;
    top: -30px;
    left: 80px;
  }

  @keyframes cloudDrift {
    0% { transform: translateX(-200px); }
    100% { transform: translateX(120vw); }
  }

  .raindrop {
    position: absolute;
    width: 2px;
    height: 18px;
    background: rgba(120,180,255,0.8);
    transform: rotate(10deg);
    animation: rainFall 0.8s linear infinite;
  }

  @keyframes rainFall {
    0% { top: -20px; left: 0; }
    100% { top: 100%; left: 10px; }
  }

  .snowflake {
    position: absolute;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: rgba(255,255,255,0.9);
    animation: snowDrift 5s linear infinite;
  }

  @keyframes snowDrift {
    0% { top: -10px; transform: translateX(0); }
    100% { top: 100%; transform: translateX(30px); }
  }

  .flash {
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0.2);
    opacity: 0;
    animation: lightningFlash 3s infinite;
  }

  @keyframes lightningFlash {
    0%, 95%, 100% { opacity: 0; }
    20% { opacity: 1; }
    22% { opacity: 0; }
    40% { opacity: 1; }
    42% { opacity: 0; }
  }
</style>
</head>

<body>

<div class="sidebar">
  <h2>Poligonostic</h2>
  <a href="/">Home</a>
  <a href="/weather/">Weather Viewer</a>
  <a href="/radar/">Live Radar</a>
  <a href="/satellite/">Satellite View</a>
  <a href="/maps/">Weather Maps</a>
  <a href="/about/">About</a>
</div>

<div class="main">

<button class="unit-toggle" onclick="toggleUnits()">Metric / Imperial</button>

<div class="weather-header">
  <div class="weather-bg" id="weatherBg"></div>
  <div class="blur-overlay"></div>

  <div class="header-content">
    <h1 class="title">Poligonostic Weather</h1>
    <div class="location-name" id="locationName">Invalid location</div>

    <div class="header-row">
      <input id="searchInput" class="search-box" type="text" placeholder="Search for a city...">
      <button class="btn" onclick="searchLocation()">Search</button>
      <button class="btn" onclick="findMyLocation()">Find My Location</button>
      <button class="btn" onclick="addFavorite()">⭐ Add to Favorites</button>
    </div>
  </div>
</div>

<div class="weather-body">
  <div class="cards-row">
    <div class="card" id="currentCard"><h3>Current Conditions</h3><p>Location data missing.</p></div>

    <div class="card">
      <h3>7-Day Forecast</h3>
      <div class="forecast-grid" id="forecastGrid"><p>No forecast available.</p></div>
    </div>
  </div>

  <footer>
    © 2026 Poligonostic Weather — Open data from weather.gov
  </footer>
</div>

</div>

<script>
let useImperial = false;

const params = new URLSearchParams(window.location.search);
const lat = Number(params.get("lat"));
const lon = Number(params.get("lon"));
const name = params.get("name");

const locationNameEl = document.getElementById("locationName");
const weatherBg = document.getElementById("weatherBg");
const currentCard = document.getElementById("currentCard");
const forecastGrid = document.getElementById("forecastGrid");

if (!lat || !lon || !name) {
  locationNameEl.textContent = "Invalid location";
  currentCard.innerHTML = "<h3>Current Conditions</h3><p>Location data missing.</p>";
  forecastGrid.innerHTML = "<p>No forecast available.</p>";
  throw new Error("Missing URL parameters");
}

locationNameEl.textContent = decodeURIComponent(name);

// ✅ FIXED WEATHER.GOV (NO MORE 196°F BUG)
async function fetchWeather(lat, lon) {
  try {
    const pointRes = await fetch(`https://api.weather.gov/points/${lat},${lon}`);
    const pointData = await pointRes.json();

    const hourlyUrl = pointData.properties.forecastHourly;
    const res = await fetch(hourlyUrl);
    const dataRaw = await res.json();

    const periods = dataRaw.properties.periods;

    function toCode(text) {
      text = text.toLowerCase();
      if (text.includes("thunder")) return 95;
      if (text.includes("snow")) return 73;
      if (text.includes("rain") || text.includes("shower")) return 61;
      if (text.includes("fog")) return 45;
      if (text.includes("cloud")) return 3;
      if (text.includes("clear")) return 0;
      return 1;
    }

    let hourly = {
      weathercode: [],
      temperature_2m: [],
      wind_speed_10m: [],
      wind_direction_10m: [],
      time: []
    };

    periods.forEach(p => {
      let temp = p.temperature;

      // 🚨 FIX: respect unit instead of assuming
      if (p.temperatureUnit === "C") {
        temp = temp * 9/5 + 32;
      }

      hourly.weathercode.push(toCode(p.shortForecast));
      hourly.temperature_2m.push(temp);
      hourly.wind_speed_10m.push(parseFloat(p.windSpeed) || 0);
      hourly.wind_direction_10m.push(0);
      hourly.time.push(p.startTime);
    });

    let daily = {
      time: [],
      weathercode: [],
      temperature_2m_min: [],
      temperature_2m_max: [],
      wind_speed_10m_max: []
    };

    let map = {};

    periods.forEach(p => {
      const date = p.startTime.split("T")[0];

      if (!map[date]) {
        map[date] = {
          min: Infinity,
          max: -Infinity,
          code: toCode(p.shortForecast),
          wind: 0
        };
      }

      let temp = p.temperature;
      if (p.temperatureUnit === "C") temp = temp * 9/5 + 32;

      map[date].min = Math.min(map[date].min, temp);
      map[date].max = Math.max(map[date].max, temp);
      map[date].wind = Math.max(map[date].wind, parseFloat(p.windSpeed) || 0);
    });

    Object.keys(map).slice(0, 7).forEach(d => {
      daily.time.push(d);
      daily.weathercode.push(map[d].code);
      daily.temperature_2m_min.push(map[d].min);
      daily.temperature_2m_max.push(map[d].max);
      daily.wind_speed_10m_max.push(map[d].wind);
    });

    const weatherData = { hourly, daily };

    updateCurrent(weatherData);
    updateForecast(weatherData);
    updateAnimation(weatherData);

  } catch (err) {
    console.error(err);
    currentCard.innerHTML = "<h3>Current Conditions</h3><p>Unable to load weather.</p>";
    forecastGrid.innerHTML = "<p>Unable to load forecast.</p>";
  }
}

fetchWeather(lat, lon);

function toggleUnits() {
  useImperial = !useImperial;
  fetchWeather(lat, lon);
}

function codeToText(code) {
  if (code === 0) return "Clear sky";
  if (code <= 2) return "Mostly clear";
  if (code === 3) return "Cloudy";
  if (code <= 48) return "Foggy";
  if (code <= 57) return "Drizzle";
  if (code <= 65) return "Rain";
  if (code <= 67) return "Freezing rain";
  if (code <= 75) return "Snow";
  if (code === 77) return "Snow grains";
  if (code <= 82) return "Rain showers";
  if (code <= 86) return "Snow showers";
  if (code <= 99) return "Thunderstorm";
  return "Unknown";
}

/* (UNCHANGED BELOW FUNCTIONS: updateCurrent, updateForecast, updateAnimation, search, etc.) */

</script>

</body></html>
