<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Poligonostic Weather</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- ========================= LOADING ========================= -->
<div id="loadingScreen"></div>


<!-- ========================= SIDEBAR ========================= -->
<aside id="sidebar">
    <div id="logo"></div>
    <nav id="nav"></nav>
</aside>


<!-- ========================= MAIN ========================= -->
<main id="app">


    <!-- ========================= HEADER ========================= -->
    <header id="header">

        <div id="weatherBackground"></div>
        <div id="overlay"></div>

        <div id="headerTop">
            <div id="title"></div>
            <div id="location"></div>
            <div id="lastUpdated"></div>
        </div>

        <div id="searchBar"></div>
        <div id="headerButtons"></div>

    </header>


    <!-- ========================= USER BAR ========================= -->
    <section id="userBar">
        <div id="favorites"></div>
        <div id="recentLocations"></div>
    </section>


    <!-- ========================= ALERTS ========================= -->
    <section id="alerts"></section>


    <!-- ========================= DASHBOARD WRAPPER ========================= -->
    <section id="dashboard">


        <!-- ===== CURRENT WEATHER ===== -->
        <section id="currentSection">
            <article id="currentCard"></article>
            <article id="summaryCard"></article>
        </section>


        <!-- ===== PRECIPITATION ===== -->
        <section id="precipSection">
            <article id="rainCard"></article>
            <article id="snowCard"></article>
            <article id="iceCard"></article>
            <article id="thunderCard"></article>
        </section>


        <!-- ===== WIND ===== -->
        <section id="windSection">
            <article id="windCard"></article>
            <article id="gustCard"></article>
            <article id="windChillCard"></article>
        </section>


        <!-- ===== ATMOSPHERE ===== -->
        <section id="atmosphereSection">
            <article id="humidityCard"></article>
            <article id="dewPointCard"></article>
            <article id="pressureCard"></article>
            <article id="visibilityCard"></article>
            <article id="cloudCoverCard"></article>
            <article id="heatIndexCard"></article>
        </section>


        <!-- ===== FORECASTS ===== -->
        <section id="forecastSection">
            <article id="hourlyForecast"></article>
            <article id="dailyForecast"></article>
            <article id="extendedForecast"></article>
            <article id="discussionForecast"></article>
        </section>


        <!-- ===== MAPS / RADAR ===== -->
        <section id="mapsSection">
            <article id="radarCard"></article>
            <article id="satelliteCard"></article>
            <article id="lightningMapCard"></article>
            <article id="windMapCard"></article>
            <article id="tempMapCard"></article>
            <article id="precipMapCard"></article>
        </section>


        <!-- ===== GRAPHS ===== -->
        <section id="graphsSection">
            <article id="tempGraph"></article>
            <article id="rainGraph"></article>
            <article id="windGraph"></article>
            <article id="pressureGraph"></article>
            <article id="humidityGraph"></article>
            <article id="uvGraph"></article>
        </section>


        <!-- ===== ASTRONOMY ===== -->
        <section id="astronomySection">
            <article id="sunCard"></article>
            <article id="moonCard"></article>
            <article id="twilightCard"></article>
        </section>


        <!-- ===== ENVIRONMENT ===== -->
        <section id="environmentSection">
            <article id="airQualityCard"></article>
            <article id="pollenCard"></article>
            <article id="fireWeatherCard"></article>
            <article id="riverLevelsCard"></article>
            <article id="droughtCard"></article>
        </section>


        <!-- ===== SPACE WEATHER ===== -->
        <section id="spaceSection">
            <article id="auroraCard"></article>
            <article id="solarCard"></article>
            <article id="geomagneticCard"></article>
        </section>


        <!-- ===== CLIMATE ===== -->
        <section id="climateSection">
            <article id="recordsCard"></article>
            <article id="normalsCard"></article>
            <article id="historyCard"></article>
        </section>


        <!-- ===== OBSERVATION ===== -->
        <section id="observationSection">
            <article id="stationCard"></article>
            <article id="metarCard"></article>
        </section>


        <!-- ===== EXTRAS ===== -->
        <section id="extrasSection">
            <article id="cameraCard"></article>
            <article id="stormReportsCard"></article>
            <article id="developerCard"></article>
        </section>


    </section>


    <!-- ========================= FOOTER ========================= -->
    <footer id="footer"></footer>

</main>


<!-- ========================= MODALS ========================= -->
<div id="searchModal"></div>
<div id="settingsModal"></div>
<div id="favoritesModal"></div>
<div id="aboutModal"></div>


<!-- ========================= CANVAS LAYERS ========================= -->
<canvas id="backgroundCanvas"></canvas>
<canvas id="radarCanvas"></canvas>
<canvas id="graphCanvas"></canvas>


<!-- ========================= APP SCRIPTS ========================= -->
<script type="module" src="app.js"></script>

<script type="module" src="scripts/weather-api.js"></script>
<script type="module" src="scripts/alerts.js"></script>
<script type="module" src="scripts/radar.js"></script>
<script type="module" src="scripts/astronomy.js"></script>

<script type="module" src="scripts/current.js"></script>
<script type="module" src="scripts/forecast.js"></script>
<script type="module" src="scripts/maps.js"></script>
<script type="module" src="scripts/graphs.js"></script>

<script type="module" src="scripts/environment.js"></script>
<script type="module" src="scripts/space.js"></script>
<script type="module" src="scripts/climate.js"></script>

<script type="module" src="scripts/observation.js"></script>
<script type="module" src="scripts/extras.js"></script>

<script type="module" src="scripts/search.js"></script>
<script type="module" src="scripts/favorites.js"></script>
<script type="module" src="scripts/settings.js"></script>

<script type="module" src="scripts/utils.js"></script>

</body>
</html>
