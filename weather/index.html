<html lang="en">
<head>
<meta charset="UTF-8">
<title>Poligonostic Weather – Viewer</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
  body {
    margin: 0;
    background: #0b1226;
    color: #e6ecff;
    font-family: 'Inter', sans-serif;
    display: flex;
  }

  .sidebar {
    width: 260px;
    background: #0f1a33;
    border-right: 2px solid #4ea3ff;
    padding: 30px 20px;
    height: 100vh;
    box-sizing: border-box;
  }

  .sidebar h2 {
    font-family: 'Great Vibes', cursive;
    font-size: 38px;
    color: #4ea3ff;
    margin-bottom: 20px;
  }

  .sidebar a {
    display: block;
    color: #cfe3ff;
    text-decoration: none;
    padding: 12px 0;
    border-bottom: 1px solid #1f2b4d;
  }

  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  .unit-toggle {
    position: absolute;
    top: 20px;
    right: 30px;
    z-index: 10;
    padding: 10px 18px;
    border-radius: 30px;
    border: 2px solid #4ea3ff;
    background: #0f1a33;
    color: #e6ecff;
    cursor: pointer;
  }

  .weather-header {
    position: relative;
    height: 45vh;
    background: #111b38;
    overflow: hidden;
  }

  .weather-bg {
    position: absolute;
    inset: 0;
    z-index: 1;
  }

  .blur-overlay {
    position: absolute;
    inset: 0;
    backdrop-filter: blur(4px);
    background: rgba(11,18,38,0.35);
    z-index: 2;
  }

  .header-content {
    position: relative;
    z-index: 3;
    padding: 20px 40px;
  }

  .title {
    font-family: 'Great Vibes', cursive;
    font-size: 60px;
    color: #4ea3ff;
    margin: 0;
  }

  .location-name {
    font-size: 26px;
    color: #9ccaff;
  }

  .header-row {
    margin-top: 20px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  .search-box {
    flex: 1;
    padding: 12px;
    border-radius: 30px;
    border: 2px solid #4ea3ff;
    background: #0f1a33;
    color: white;
  }

  .btn {
    padding: 10px 16px;
    border-radius: 20px;
    border: 2px solid #4ea3ff;
    background: #0f1a33;
    color: white;
    cursor: pointer;
  }

  .weather-body {
    flex: 1;
    padding: 30px;
    overflow-y: auto;
  }

  .cards-row {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
  }

  .card {
    flex: 1;
    min-width: 280px;
    background: rgba(17,27,56,0.9);
    border: 2px solid #4ea3ff;
    padding: 20px;
    border-radius: 14px;
  }

  .forecast-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill,minmax(160px,1fr));
    gap: 10px;
  }

  .forecast-item {
    background: #111b38;
    padding: 10px;
    border-radius: 10px;
    border: 1px solid #2b3c6f;
  }
</style>
</head>

<body>

<div class="sidebar">
  <h2>Poligonostic</h2>
  <a href="/">Home</a>
  <a href="/weather/">Weather</a>
  <a href="/radar/">Radar</a>
</div>

<div class="main">

<button class="unit-toggle" onclick="toggleUnits()">Metric / Imperial</button>

<div class="weather-header">
  <div class="weather-bg" id="weatherBg"></div>
  <div class="blur-overlay"></div>

  <div class="header-content">
    <h1 class="title">Poligonostic Weather</h1>
    <div class="location-name" id="locationName"></div>

    <div class="header-row">
      <input id="searchInput" class="search-box" placeholder="Search city...">
      <button class="btn" onclick="searchLocation()">Search</button>
      <button class="btn" onclick="findMyLocation()">My Location</button>
      <button class="btn" onclick="addFavorite()">⭐</button>
    </div>
  </div>
</div>

<div class="weather-body">
  <div class="cards-row">
    <div class="card" id="currentCard">Loading...</div>
    <div class="card">
      <div class="forecast-grid" id="forecastGrid"></div>
    </div>
  </div>
</div>

</div>

<script>
let useImperial = false;

const params = new URLSearchParams(location.search);
const lat = Number(params.get("lat"));
const lon = Number(params.get("lon"));
const name = params.get("name");

document.getElementById("locationName").textContent =
  decodeURIComponent(name || "Unknown Location");

async function fetchWeather(lat, lon) {
  try {
    const pRes = await fetch(`https://api.weather.gov/points/${lat},${lon}`);
    const pData = await pRes.json();

    const url = pData?.properties?.forecastHourly || pData?.properties?.forecast;
    if (!url) throw new Error("No forecast URL");

    const wRes = await fetch(url);
    const wData = await wRes.json();

    const periods = wData?.properties?.periods || [];

    const hourly = {
      temp: [],
      text: [],
      time: []
    };

    periods.forEach(p => {
      let t = p.temperature;

      // FIX: avoid unit issues
      if (p.temperatureUnit === "C") {
        t = t * 9/5 + 32;
      }

      hourly.temp.push(t);
      hourly.text.push(p.shortForecast || "Weather");
      hourly.time.push(p.startTime);
    });

    updateUI(hourly);

  } catch (err) {
    console.error(err);
    document.getElementById("currentCard").textContent =
      "Unable to load weather";
  }
}

function updateUI(h) {
  const current = h.temp[0];

  document.getElementById("currentCard").innerHTML =
    `<h3>Current</h3><p>${Math.round(current)}°</p>`;

  const grid = document.getElementById("forecastGrid");
  grid.innerHTML = "";

  for (let i = 0; i < Math.min(7, h.temp.length); i++) {
    const div = document.createElement("div");
    div.className = "forecast-item";
    div.innerHTML = `
      <b>${Math.round(h.temp[i])}°</b><br>
      ${h.text[i]}
    `;
    grid.appendChild(div);
  }
}

function toggleUnits() {
  useImperial = !useImperial;
  fetchWeather(lat, lon);
}

function searchLocation() {}
function findMyLocation() {}
function addFavorite() {}

fetchWeather(lat, lon);
</script>

</body>
</html>
