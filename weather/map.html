<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Select Location – Poligonostic Weather</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
  body {
    margin: 0;
    background: #0b1226;
    color: #e6ecff;
    font-family: 'Inter', sans-serif;
  }

  #map {
    height: 100vh;
    width: 100vw;
  }

  .info-box {
    position: absolute;
    top: 20px;
    left: 20px;
    background: #0f1a33;
    padding: 15px 20px;
    border-radius: 12px;
    border: 2px solid #4ea3ff;
    color: #e6ecff;
    font-size: 18px;
    z-index: 999;
  }

  .confirm-btn {
    margin-top: 10px;
    padding: 8px 14px;
    background: #0f1a33;
    border: 2px solid #4ea3ff;
    color: #e6ecff;
    border-radius: 10px;
    cursor: pointer;
  }

  .confirm-btn:hover {
    background: #14254a;
  }
</style>
</head>

<body>

<div class="info-box">
  Click anywhere on the map to choose your location
</div>

<div id="map"></div>

<script>
  const map = L.map('map').setView([20, 0], 2);

  L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19
  }).addTo(map);

  let marker;

  map.on('click', async function(e) {
    const lat = e.latlng.lat;
    const lon = e.latlng.lng;

    if (marker) map.removeLayer(marker);

    marker = L.marker([lat, lon]).addTo(map);

    let cityName = "Unknown Location";

    try {
      const url = `https://geocoding-api.open-meteo.com/v1/reverse?latitude=${lat}&longitude=${lon}&language=en&format=json&distance=50`;
      const res = await fetch(url);
      const data = await res.json();

      if (data.results && data.results.length > 0) {
        cityName = data.results[0].name;
      }
    } catch (err) {
      cityName = "Unknown Location";
    }

    marker.bindPopup(`
      <b>${cityName}</b><br>
      <button class="confirm-btn" onclick="goToWeather(${lat}, ${lon}, '${encodeURIComponent(cityName)}')">
        Use this location
      </button>
    `).openPopup();
  });

  function goToWeather(lat, lon, encodedName) {
    window.location.href =
      `/weather/?lat=${lat}&lon=${lon}&name=${encodedName}`;
  }
</script>

</body>
</html>
