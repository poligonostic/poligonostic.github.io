<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Poligonostic</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<!-- Leaflet -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
  body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    color: #0b1226;

    /* ⭐ DARK BLUE → LIGHT BLUE → WHITE GRADIENT */
    background: linear-gradient(
      to bottom,
      #0b1226 0%,
      #1a2f55 25%,
      #4ea3ff 60%,
      #ffffff 100%
    );
    background-attachment: fixed;
  }

  /* ⭐ SIDEBAR UPGRADE */
  #sidebar {
    width: 240px;
    height: 100vh;
    position: fixed;
    left: 0;
    top: 0;

    background: linear-gradient(
      to bottom,
      #0f1a33 0%,
      #14244a 50%,
      #0f1a33 100%
    );
    border-right: 3px solid #ff7adf;
    box-shadow: 0 0 20px #ff7adf88;

    padding: 20px;
    box-sizing: border-box;
    z-index: 1000;
  }

  #sidebar h2 {
    font-family: 'Great Vibes', cursive;
    font-size: 42px;
    color: #ffffff;
    text-shadow: 0 0 12px #ff7adf;
    margin-bottom: 25px;
  }

  #sidebar a {
    display: block;
    padding: 12px 0;
    font-size: 17px;
    color: #cfe3ff;
    text-decoration: none;
    transition: 0.2s;
  }

  #sidebar a:hover {
    color: #ffffff;
    text-shadow: 0 0 10px #ff7adf;
    transform: translateX(4px);
  }

  /* MAIN */
  #main {
    margin-left: 260px;
    padding: 40px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  /* ⭐ BIG LOGO */
  #logo {
    font-family: 'Great Vibes', cursive;
    font-size: 110px;
    color: #ffffff;
    text-shadow: 0 0 20px #ff7adf, 0 0 40px #ff7adf;
    margin-bottom: 10px;
  }

  /* ⭐ TIME + DATE */
  #datetime {
    font-size: 22px;
    color: #1a2f55;
    margin-bottom: 40px;
  }

  #enterBtn {
    padding: 14px 28px;
    font-size: 20px;
    border-radius: 30px;
    border: 2px solid #ff7adf;
    background: #0f1a33;
    color: #ffffff;
    cursor: pointer;
    transition: 0.2s;
    box-shadow: 0 0 12px #ff7adf88;
  }

  #enterBtn:hover {
    background: #18254a;
    box-shadow: 0 0 20px #ff7adf;
  }

  /* SEARCH */
  #searchInput {
    width: 60%;
    padding: 12px;
    border-radius: 10px;
    border: 2px solid #ff7adf;
    background: #0f1a33;
    color: #ffffff;
    font-size: 18px;
    margin-top: 40px;
    box-shadow: 0 0 12px #ff7adf88;
  }

  #suggestions {
    width: 60%;
    margin: 0 auto;
    background: #0f1a33;
    border: 2px solid #ff7adf;
    border-top: none;
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    z-index: 9999;
  }

  .suggestion {
    padding: 10px;
    cursor: pointer;
    color: #ffffff;
  }

  .suggestion:hover {
    background: #18254a;
  }

  /* MAP */
  #map {
    width: 60%;
    height: 300px;
    margin: 40px auto;
    border-radius: 12px;
    border: 2px solid #ff7adf;
    box-shadow: 0 0 20px #ff7adf88;
  }

  /* ⭐ DRIFTING CLOUDS */
  .cloud {
    position: absolute;
    top: 80px;
    width: 200px;
    opacity: 0.8;
    animation: drift 40s linear infinite;
  }

  .cloud2 {
    top: 160px;
    width: 260px;
    opacity: 0.7;
    animation: drift2 55s linear infinite;
  }

  @keyframes drift {
    from { left: -300px; }
    to { left: 120%; }
  }

  @keyframes drift2 {
    from { left: 120%; }
    to { left: -300px; }
  }

  /* ⭐ SUN */
  #sun {
    position: absolute;
    top: 40px;
    right: 80px;
    width: 120px;
    height: 120px;
    background: radial-gradient(circle, #fff7c2 0%, #ffd34d 60%, #ffb300 100%);
    border-radius: 50%;
    box-shadow: 0 0 40px #ffd34d;
    animation: floatSun 12s ease-in-out infinite;
  }

  @keyframes floatSun {
    0% { transform: translateY(0px); }
    50% { transform: translateY(-20px); }
    100% { transform: translateY(0px); }
  }
</style>
</head>

<body>

<!-- SIDEBAR -->
<aside id="sidebar">
  <h2>Poligonostic</h2>
  <a href="/">Home</a>
  <a href="/weather/">Weather</a>
  <a href="/radar/index.html">Radar</a>
  <a href="/maps/">Maps</a>
  <a href="/settings/">Settings</a>
  <a href="/about/">About</a>
</aside>

<!-- MAIN -->
<div id="main">
s
  <!-- SUN -->
  <div id="sun"></div>

  <!-- LOGO -->
  <div id="logo">Poligonostic</div>

  <!-- TIME + DATE -->
  <div id="datetime"></div>

  <button id="enterBtn" onclick="goWeather()">Enter Weather</button>

  <input id="searchInput" placeholder="Search for a location…">
  <div id="suggestions"></div>

  <div id="map"></div>
</div>

<script>
/* ============================
   MAP + SEARCH SYSTEM
   ============================ */

let map = L.map('map').setView([34.7465, -92.2896], 6);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19
}).addTo(map);

let marker = L.marker([34.7465, -92.2896]).addTo(map);

function setLocation(lat, lon) {
  marker.setLatLng([lat, lon]);
  map.setView([lat, lon], 8);
  loadWeather(lat, lon);
}

/* CLICK ON MAP TO SET LOCATION */
map.on('click', function(e) {
  const lat = e.latlng.lat;
  const lon = e.latlng.lng;
  setLocation(lat, lon);
});

/* SEARCH BAR AUTOCOMPLETE */
const searchInput = document.getElementById("searchInput");
const suggestions = document.getElementById("suggestions");

searchInput.addEventListener("input", async () => {
  const q = searchInput.value.trim();
  if (!q) {
    suggestions.innerHTML = "";
    return;
  }

  const url = `https://photon.komoot.io/api/?q=${encodeURIComponent(q)}`;
  const res = await fetch(url);
  const data = await res.json();

  suggestions.innerHTML = "";

  data.features.slice(0, 5).forEach(f => {
    const props = f.properties;

    const name = props.name || props.city || "Unknown";

    // Clean readable label
    const city = props.city || name;
    const state = props.state || "";
    const country = props.country || "";
    const type = props.type || "place";

    const labelParts = [city, state, country].filter(Boolean);
    const label = `${labelParts.join(", ")} — ${type}`;

    const lat = f.geometry.coordinates[1];
    const lon = f.geometry.coordinates[0];

    const div = document.createElement("div");
    div.className = "suggestion";
    div.textContent = label;

    div.onclick = () => {
      suggestions.innerHTML = "";
      searchInput.value = label;
      setLocation(lat, lon);
    };

    suggestions.appendChild(div);
  });
});

/* ============================
   WEATHER SYSTEM
   ============================ */

function goHome() {
  window.location.href = "/";
}

function openRadar() {
  window.location.href = "/radar/index.html";
}

/* FALLBACK ICON LOADER */
function loadIcon(primary, fallback) {
  return new Promise(resolve => {
    const img = new Image();
    img.src = primary;
    img.onload = () => resolve(primary);
    img.onerror = () => resolve(fallback);
  });
}

/* SVG PICKER */
function pickSVG(shortForecast) {
  shortForecast = (shortForecast || "").toLowerCase();

  if (shortForecast.includes("thunder")) return "thunder.svg";
  if (shortForecast.includes("snow")) return "snowy-3.svg";
  if (shortForecast.includes("rain") || shortForecast.includes("shower")) return "rainy-4.svg";
  if (shortForecast.includes("cloudy") && shortForecast.includes("day")) return "cloudy-day-2.svg";
  if (shortForecast.includes("cloudy") && shortForecast.includes("night")) return "cloudy-night-2.svg";
  if (shortForecast.includes("cloud")) return "cloudy.svg";
  if (shortForecast.includes("sunny") || shortForecast.includes("clear")) return "day.svg";
  if (shortForecast.includes("night") && shortForecast.includes("clear")) return "night.svg";

  return "weather.svg";
}

async function getWeatherIcon(shortForecast, noaaIcon) {
  const svg = pickSVG(shortForecast);
  return await loadIcon(svg, noaaIcon);
}

/* MAIN WEATHER LOADER */
async function loadWeather(lat, lon) {
  document.getElementById("updatedLabel").textContent =
    "Last updated: " + new Date().toLocaleString();

  const noaaPointURL = `https://api.weather.gov/points/${lat},${lon}`;
  const openMeteoURL =
    `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}` +
    `&hourly=temperature_2m,relativehumidity_2m,pressure_msl,visibility,cloudcover,apparent_temperature,windspeed_10m,winddirection_10m` +
    `&current_weather=true&timezone=auto`;

  try {
    const [noaaPointRes, omRes] = await Promise.all([
      fetch(noaaPointURL),
      fetch(openMeteoURL)
    ]);

    const noaaPoint = await noaaPointRes.json();
    const omData = await omRes.json();

    try {
      const rel = noaaPoint.properties.relativeLocation.properties;
      const name = `${rel.city}, ${rel.state}`;
      document.getElementById("locationLabel").textContent = `Location: ${name}`;
    } catch {
      document.getElementById("locationLabel").textContent =
        `Location: lat ${lat.toFixed(3)}, lon ${lon.toFixed(3)}`;
    }

    const forecastURL = noaaPoint.properties.forecast;
    const hourlyURL = noaaPoint.properties.forecastHourly;

    const [noaaDailyRes, noaaHourlyRes] = await Promise.all([
      fetch(forecastURL),
      fetch(hourlyURL)
    ]);

    const noaaDaily = await noaaDailyRes.json();
    const noaaHourly = await noaaHourlyRes.json();

    await renderCurrent(noaaDaily);
    await renderHourly(noaaHourly);
    await renderDaily(noaaDaily);
    renderAtmosphere(noaaHourly, omData);

  } catch (e) {
    console.error(e);
    document.getElementById("currentCard").innerHTML =
      "<h2>Current</h2><p class='error'>Error loading data.</p>";
  }
}

/* CURRENT */
async function renderCurrent(noaaDaily) {
  const card = document.getElementById("currentCard");
  const periods = noaaDaily.properties.periods || [];
  if (!periods.length) {
    card.innerHTML = "<h2>Current</h2><p class='error'>No data.</p>";
    return;
  }

  const p = periods[0];
  const icon = await getWeatherIcon(p.shortForecast, p.icon);

  card.innerHTML = `
    <h2>Current</h2>
    <div class="current-frame"><img src="${icon}"></div>
    <h1>${p.temperature}°F</h1>
    <p>${p.shortForecast}</p>
    <p class="small-label">Wind: ${p.windSpeed} ${p.windDirection}</p>
  `;
}

/* HOURLY */
async function renderHourly(noaaHourly) {
  const card = document.getElementById("hourlyCard");
  const periods = noaaHourly.properties.periods || [];

  let html = "<h2>Hourly</h2>";

  for (let i = 0; i < 6 && i < periods.length; i++) {
    const p = periods[i];
    const icon = await getWeatherIcon(p.shortForecast, p.icon);

    html += `
      <div style="margin-bottom:10px;display:flex;align-items:center;gap:8px;">
        <img src="${icon}" style="width:40px;height:40px;">
        <div>
          <b>${p.startTime.slice(11,16)}</b><br>
          ${p.temperature}°${p.temperatureUnit} - ${p.shortForecast}<br>
          Wind: ${p.windSpeed} ${p.windDirection}
        </div>
      </div>
    `;
  }

  card.innerHTML = html;
}

/* DAILY */
async function renderDaily(noaaDaily) {
  const card = document.getElementById("dailyCard");
  const periods = noaaDaily.properties.periods || [];

  let html = "<h2>Daily</h2>";

  for (let i = 0; i < 6 && i < periods.length; i++) {
    const p = periods[i];
    const icon = await getWeatherIcon(p.shortForecast, p.icon);

    html += `
      <div style="margin-bottom:10px;display:flex;align-items:center;gap:8px;">
        <img src="${icon}" style="width:40px;height:40px;">
        <div>
          <b>${p.name}</b><br>
          ${p.shortForecast}<br>
          ${p.temperature}°${p.temperatureUnit}
        </div>
      </div>
    `;
  }

  card.innerHTML = html;
}

/* ATMOSPHERE */
function renderAtmosphere(noaaHourly, omData) {
  const periods = noaaHourly.properties.periods || [];
  const first = periods[0];

  document.getElementById("windCard").innerHTML = `
    <h2>Wind</h2>
    <p class="value">${first.windSpeed}</p>
    <p class="small-label">Direction: ${first.windDirection}</p>
  `;

  const hourly = omData.hourly;
  const idx = 0;

  const rh = hourly.relativehumidity_2m[idx];
  document.getElementById("humidityCard").innerHTML = `
    <h2>Humidity</h2>
    <p class="value">${rh}%</p>
  `;

  const p = hourly.pressure_msl[idx];
  document.getElementById("pressureCard").innerHTML = `
    <h2>Pressure</h2>
    <p class="value">${p.toFixed(1)} hPa</p>
  `;

  const vis = hourly.visibility[idx];
  document.getElementById("visibilityCard").innerHTML = `
    <h2>Visibility</h2>
    <p class="value">${(vis/1609.34).toFixed(1)} miles</p>
  `;

  const cc = hourly.cloudcover[idx];
  document.getElementById("cloudCard").innerHTML = `
    <h2>Cloud Cover</h2>
    <p class="value">${cc}%</p>
  `;

  const hiC = hourly.apparent_temperature[idx];
  const hiF = hiC * 9/5 + 32;
  document.getElementById("heatIndexCard").innerHTML = `
    <h2>Heat Index</h2>
    <p class="value">${hiF.toFixed(1)}°F</p>
  `;
}

/* INITIAL LOAD (default coords) */
setLocation(34.7465, -92.2896);
</script>


</body>
</html>
