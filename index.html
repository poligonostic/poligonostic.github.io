<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Poligonostic</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<!-- Leaflet -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
  body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    color: #0b1226;

    /* ⭐ DARK BLUE → LIGHT BLUE → WHITE GRADIENT */
    background: linear-gradient(
      to bottom,
      #0b1226 0%,
      #1a2f55 25%,
      #4ea3ff 60%,
      #ffffff 100%
    );
    background-attachment: fixed;
  }

  /* ⭐ SIDEBAR UPGRADE */
  #sidebar {
    width: 240px;
    height: 100vh;
    position: fixed;
    left: 0;
    top: 0;

    background: linear-gradient(
      to bottom,
      #0f1a33 0%,
      #14244a 50%,
      #0f1a33 100%
    );
    border-right: 3px solid #ff7adf;
    box-shadow: 0 0 20px #ff7adf88;

    padding: 20px;
    box-sizing: border-box;
    z-index: 1000;
  }

  #sidebar h2 {
    font-family: 'Great Vibes', cursive;
    font-size: 42px;
    color: #ffffff;
    text-shadow: 0 0 12px #ff7adf;
    margin-bottom: 25px;
  }

  #sidebar a {
    display: block;
    padding: 12px 0;
    font-size: 17px;
    color: #cfe3ff;
    text-decoration: none;
    transition: 0.2s;
  }

  #sidebar a:hover {
    color: #ffffff;
    text-shadow: 0 0 10px #ff7adf;
    transform: translateX(4px);
  }

  /* MAIN */
  #main {
    margin-left: 260px;
    padding: 40px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  /* ⭐ BIG LOGO */
  #logo {
    font-family: 'Great Vibes', cursive;
    font-size: 110px;
    color: #ffffff;
    text-shadow: 0 0 20px #ff7adf, 0 0 40px #ff7adf;
    margin-bottom: 10px;
  }

  /* ⭐ TIME + DATE */
  #datetime {
    font-size: 22px;
    color: #1a2f55;
    margin-bottom: 40px;
  }

  #enterBtn {
    padding: 14px 28px;
    font-size: 20px;
    border-radius: 30px;
    border: 2px solid #ff7adf;
    background: #0f1a33;
    color: #ffffff;
    cursor: pointer;
    transition: 0.2s;
    box-shadow: 0 0 12px #ff7adf88;
  }

  #enterBtn:hover {
    background: #18254a;
    box-shadow: 0 0 20px #ff7adf;
  }

  /* SEARCH */
  #searchInput {
    width: 60%;
    padding: 12px;
    border-radius: 10px;
    border: 2px solid #ff7adf;
    background: #0f1a33;
    color: #ffffff;
    font-size: 18px;
    margin-top: 40px;
    box-shadow: 0 0 12px #ff7adf88;
  }

  #suggestions {
    width: 60%;
    margin: 0 auto;
    background: #0f1a33;
    border: 2px solid #ff7adf;
    border-top: none;
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    z-index: 9999;
  }

  .suggestion {
    padding: 10px;
    cursor: pointer;
    color: #ffffff;
  }

  .suggestion:hover {
    background: #18254a;
  }

  /* MAP */
  #map {
    width: 60%;
    height: 300px;
    margin: 40px auto;
    border-radius: 12px;
    border: 2px solid #ff7adf;
    box-shadow: 0 0 20px #ff7adf88;
  }

  /* ⭐ DRIFTING CLOUDS */
  .cloud {
    position: absolute;
    top: 80px;
    width: 200px;
    opacity: 0.8;
    animation: drift 40s linear infinite;
  }

  .cloud2 {
    top: 160px;
    width: 260px;
    opacity: 0.7;
    animation: drift2 55s linear infinite;
  }

  @keyframes drift {
    from { left: -300px; }
    to { left: 120%; }
  }

  @keyframes drift2 {
    from { left: 120%; }
    to { left: -300px; }
  }

  /* ⭐ SUN */
  #sun {
    position: absolute;
    top: 40px;
    right: 80px;
    width: 120px;
    height: 120px;
    background: radial-gradient(circle, #fff7c2 0%, #ffd34d 60%, #ffb300 100%);
    border-radius: 50%;
    box-shadow: 0 0 40px #ffd34d;
    animation: floatSun 12s ease-in-out infinite;
  }

  @keyframes floatSun {
    0% { transform: translateY(0px); }
    50% { transform: translateY(-20px); }
    100% { transform: translateY(0px); }
  }
</style>
</head>

<body>

<!-- SIDEBAR -->
<aside id="sidebar">
  <h2>Poligonostic</h2>
  <a href="/">Home</a>
  <a href="/weather/">Weather</a>
  <a href="/radar/index.html">Radar</a>
  <a href="/maps/">Maps</a>
  <a href="/settings/">Settings</a>
  <a href="/about/">About</a>
</aside>

<!-- MAIN -->
<div id="main">
s
  <!-- SUN -->
  <div id="sun"></div>

  <!-- LOGO -->
  <div id="logo">Poligonostic</div>

  <!-- TIME + DATE -->
  <div id="datetime"></div>

  <button id="enterBtn" onclick="goWeather()">Enter Weather</button>

  <input id="searchInput" placeholder="Search for a location…">
  <div id="suggestions"></div>

  <div id="map"></div>
</div>

<script>
function goWeather() {
  window.location.href = "/weather/";
}

/* TIME + DATE */
function updateTime() {
  const now = new Date();
  document.getElementById("datetime").textContent =
    now.toLocaleString();
}
setInterval(updateTime, 1000);
updateTime();

/* MAP */
let map = L.map('map').setView([34.7465, -92.2896], 5);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19
}).addTo(map);

let marker = L.marker([34.7465, -92.2896]).addTo(map);

/* SEARCH */
const searchInput = document.getElementById("searchInput");
const suggestions = document.getElementById("suggestions");

searchInput.addEventListener("input", async () => {
  const q = searchInput.value.trim();
  if (!q) {
    suggestions.innerHTML = "";
    return;
  }

  const url = `https://photon.komoot.io/api/?q=${encodeURIComponent(q)}`;
  const res = await fetch(url);
  const data = await res.json();

  suggestions.innerHTML = "";

  data.features.slice(0, 5).forEach(f => {
    const name = f.properties.name || f.properties.city || "Unknown";
    const lat = f.geometry.coordinates[1];
    const lon = f.geometry.coordinates[0];

    const div = document.createElement("div");
    div.className = "suggestion";
    div.textContent = name;
    div.onclick = () => {
      suggestions.innerHTML = "";
      searchInput.value = name;
      marker.setLatLng([lat, lon]);
      map.setView([lat, lon], 8);
      window.location.href = `/weather/?lat=${lat}&lon=${lon}`;
    };

    suggestions.appendChild(div);
  });
});
</script>

</body>
</html>
