<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Poligonostic Weather</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
    body {
        margin: 0;
        background: #0b1226;
        color: #e6ecff;
        font-family: 'Inter', sans-serif;
    }

    #app {
        padding: 20px;
        max-width: 1400px;
        margin: auto;
    }

    h2 {
        margin: 0 0 10px 0;
        font-size: 22px;
        color: #4ea3ff;
    }

    .big-row {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 20px;
        margin-bottom: 30px;
    }

    .big-card {
        background: #111b38;
        padding: 20px;
        border-radius: 12px;
        border: 2px solid #4ea3ff;
    }

    .grid-row {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 20px;
    }

    .grid-card {
        background: #111b38;
        padding: 20px;
        border-radius: 12px;
        border: 2px solid #2b3c6f;
    }

    img {
        width: 60px;
    }
</style>
</head>

<body>

<div id="app">

    <!-- ========================= ROW 1 ========================= -->
    <div class="big-row">
        <div class="big-card" id="currentCard"><h2>Current</h2>Loading...</div>
        <div class="big-card" id="hourlyCard"><h2>Hourly</h2>Loading...</div>
        <div class="big-card" id="dailyCard"><h2>Daily</h2>Loading...</div>
    </div>

    <!-- ========================= ROW 2 ========================= -->
    <div class="grid-row">
        <div class="grid-card" id="windCard"><h2>Wind</h2>Loading...</div>
        <div class="grid-card" id="humidityCard"><h2>Humidity</h2>Loading...</div>
        <div class="grid-card" id="pressureCard"><h2>Pressure</h2>Loading...</div>
        <div class="grid-card" id="visibilityCard"><h2>Visibility</h2>Loading...</div>

        <div class="grid-card" id="cloudCard"><h2>Cloud Cover</h2>Loading...</div>
        <div class="grid-card" id="heatIndexCard"><h2>Heat Index</h2>Loading...</div>
        <div class="grid-card" id="radarCard"><h2>Radar</h2>Loading...</div>
        <div class="grid-card" id="satelliteCard"><h2>Satellite</h2>Loading...</div>
    </div>

</div>

<script>
async function loadWeather() {
    const params = new URLSearchParams(location.search);
    const lat = params.get("lat");
    const lon = params.get("lon");

    if (!lat || !lon) {
        document.body.innerHTML = "<h1 style='color:white;padding:20px;'>Missing coordinates</h1>";
        return;
    }

    // Get NOAA gridpoint
    const point = await fetch(`https://api.weather.gov/points/${lat},${lon}`);
    const pointData = await point.json();

    const forecastURL = pointData.properties.forecast;
    const hourlyURL = pointData.properties.forecastHourly;

    // Fetch daily forecast
    const dailyReq = await fetch(forecastURL);
    const dailyData = await dailyReq.json();
    const daily = dailyData.properties.periods;

    // Fetch hourly forecast
    const hourlyReq = await fetch(hourlyURL);
    const hourlyData = await hourlyReq.json();
    const hourly = hourlyData.properties.periods;

    // ========================= CURRENT =========================
    const c = daily[0];
    document.getElementById("currentCard").innerHTML = `
        <h2>Current</h2>
        <img src="${c.icon}">
        <h1>${c.temperature}°${c.temperatureUnit}</h1>
        <p>${c.shortForecast}</p>
    `;

    // ========================= HOURLY =========================
    let hourlyHTML = "<h2>Hourly</h2>";
    for (let i = 0; i < 6; i++) {
        const h = hourly[i];
        hourlyHTML += `
            <div style="margin-bottom:10px;">
                <b>${h.startTime.slice(11,16)}</b><br>
                ${h.temperature}°${h.temperatureUnit} - ${h.shortForecast}
            </div>
        `;
    }
    document.getElementById("hourlyCard").innerHTML = hourlyHTML;

    // ========================= DAILY =========================
    let dailyHTML = "<h2>Daily</h2>";
    for (let i = 0; i < 6; i++) {
        const d = daily[i];
        dailyHTML += `
            <div style="margin-bottom:10px;">
                <b>${d.name}</b><br>
                ${d.shortForecast}<br>
                ${d.temperature}°${d.temperatureUnit}
            </div>
        `;
    }
    document.getElementById("dailyCard").innerHTML = dailyHTML;

    // ========================= WIND =========================
    document.getElementById("windCard").innerHTML = `
        <h2>Wind</h2>
        <p>${c.windSpeed}</p>
        <p>${c.windDirection}</p>
    `;

    // ========================= HUMIDITY =========================
    const humidity = hourly[0].relativeHumidity?.value ?? "N/A";
    document.getElementById("humidityCard").innerHTML = `
        <h2>Humidity</h2>
        <p>${humidity}%</p>
    `;

    // ========================= PRESSURE =========================
    const pressure = hourly[0].pressure?.value ?? "N/A";
    document.getElementById("pressureCard").innerHTML = `
        <h2>Pressure</h2>
        <p>${pressure} mb</p>
    `;

    // ========================= VISIBILITY =========================
    const visibility = hourly[0].visibility?.value ?? "N/A";
    document.getElementById("visibilityCard").innerHTML = `
        <h2>Visibility</h2>
        <p>${visibility} meters</p>
    `;

    // ========================= CLOUD COVER =========================
    const cloud = hourly[0].cloudCover?.value ?? "N/A";
    document.getElementById("cloudCard").innerHTML = `
        <h2>Cloud Cover</h2>
        <p>${cloud}%</p>
    `;

    // ========================= HEAT INDEX =========================
    const heatIndex = hourly[0].heatIndex?.value ?? "N/A";
    document.getElementById("heatIndexCard").innerHTML = `
        <h2>Heat Index</h2>
        <p>${heatIndex}°</p>
    `;

    // ========================= RADAR =========================
    document.getElementById("radarCard").innerHTML = `
        <h2>Radar</h2>
        <img src="https://radar.weather.gov/ridge/standard/${pointData.properties.gridId}_0.gif" width="100%">
    `;

    // ========================= SATELLITE =========================
    document.getElementById("satelliteCard").innerHTML = `
        <h2>Satellite</h2>
        <img src="https://cdn.star.nesdis.noaa.gov/GOES16/ABI/FD/GEOCOLOR/GOES16-ABI-FD-GEOCOLOR-1808x1808.jpg" width="100%">
    `;
}

loadWeather();
</script>

</body>
</html>
