<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>POLIGONOSTIC — ASCII VIDEO PLAYER</title>

<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>

:root{
    --purple:#c77dff;
    --purple-dark:#7b2cbf;
}

*{
    box-sizing:border-box;
}

body{
    margin:0;
    background:radial-gradient(circle at center,#120018,#000);
    color:var(--purple);
    font-family:"Share Tech Mono",monospace;
    overflow:hidden;
}

/* HEADER */

#topbar{
    position:fixed;
    top:0;
    left:0;
    right:0;
    height:55px;

    display:flex;
    align-items:center;

    padding:0 18px;

    background:rgba(15,0,25,.95);

    border-bottom:1px solid var(--purple-dark);

    box-shadow:0 0 25px rgba(199,125,255,.25);
}

#title{
    font-size:20px;
    font-weight:bold;
    letter-spacing:3px;

    text-shadow:
        0 0 10px var(--purple),
        0 0 25px var(--purple);
}

/* SIDEBAR */

#sidebar{
    position:fixed;
    top:55px;
    left:0;
    bottom:0;
    width:250px;

    background:rgba(8,0,15,.95);

    border-right:1px solid var(--purple-dark);

    padding:18px;
}

.sectionTitle{
    font-size:14px;
    margin-bottom:8px;
}

.navItem{
    margin:8px 0;
    opacity:.9;
}

.active{
    color:white;
}

.comingSoon{
    margin-top:20px;
    font-size:12px;
    opacity:.75;
}

/* BUTTONS */

button{
    width:100%;

    margin-top:10px;

    padding:10px;

    border:none;
    border-radius:8px;

    cursor:pointer;

    color:white;

    font-family:inherit;

    background:
        linear-gradient(
            135deg,
            #7b2cbf,
            #c77dff
        );

    box-shadow:
        0 0 18px rgba(199,125,255,.4);
}

button:hover{
    transform:translateY(-1px);
}

/* MAIN */

#main{
    margin-left:250px;
    margin-top:55px;

    height:calc(100vh - 55px);

    display:flex;
    justify-content:center;
    align-items:center;
}

/* VIEWPORT */

#viewer{
    width:920px;
    height:620px;

    background:black;

    border:1px solid var(--purple-dark);

    box-shadow:
        0 0 40px rgba(199,125,255,.3);

    display:flex;
    justify-content:center;
    align-items:center;

    position:relative;
}

canvas{
    display:block;
}

/* CONTROL BAR */

#controls{
    position:absolute;

    left:0;
    right:0;
    bottom:0;

    background:rgba(8,0,15,.95);

    border-top:1px solid var(--purple-dark);

    padding:10px;

    display:flex;
    align-items:center;
    gap:10px;
}

#controls button{
    width:auto;
    margin:0;
    padding:6px 12px;
}

input[type="range"]{
    accent-color:var(--purple);
}

/* STATUS */

#status{
    position:absolute;

    left:10px;
    top:10px;

    font-size:12px;

    background:rgba(0,0,0,.55);

    padding:8px;

    border:1px solid rgba(199,125,255,.3);
}

#videoFile{
    display:none;
}

</style>
</head>
<body>

<div id="topbar">
    <div id="title">
        POLIGONOSTIC — ASCII VIDEO PLAYER
    </div>
</div>

<div id="sidebar">

    <div class="sectionTitle">
        POLIGONOSTIC
    </div>

    <div class="navItem active">
        ▶ ASCII Video Player
    </div>

    <div class="comingSoon">
        COMING SOON
        <br><br>
        • ASCII Image Converter
        <br>
        • ASCII Webcam Studio
        <br>
        • ASCII Paint Studio
        <br>
        • ASCII Export Center
    </div>

    <button id="loadBtn">
        LOAD VIDEO
    </button>

    <input
        id="videoFile"
        type="file"
        accept="video/*">

</div>

<div id="main">

    <div id="viewer">

        <canvas id="asciiCanvas"></canvas>

        <div id="status">
            VIDEO: none<br>
            ASCII GRID: 120 × 70<br>
            MODE: TRUE COLOR
        </div>

        <div id="controls">

            <button id="playBtn">
                ⏯
            </button>

            <span>TIME</span>

            <input
                id="seek"
                type="range"
                min="0"
                value="0">

            <span>DENSITY</span>

            <input
                id="density"
                type="range"
                min="5"
                max="12"
                value="7">

            <button id="bwBtn">
                B/W
            </button>

        </div>

    </div>

</div>

<video
    id="video"
    muted
    playsinline
    style="display:none">
</video>

<script>

const canvas =
document.getElementById("asciiCanvas");

const ctx =
canvas.getContext("2d");

const video =
document.getElementById("video");

const loadBtn =
document.getElementById("loadBtn");

const fileInput =
document.getElementById("videoFile");

const playBtn =
document.getElementById("playBtn");

const seek =
document.getElementById("seek");

const density =
document.getElementById("density");

const bwBtn =
document.getElementById("bwBtn");

const status =
document.getElementById("status");

/* FIXED VIEWPORT */

canvas.width = 900;
canvas.height = 560;

/* ASCII */

const chars =
" .'`^\",:;Il!i~+_-?][}{1)(|\\/tfjrxnuvczXYUJCLQ0OZmwqpdbkhao*#MW&8%B@$";

const GRID_W = 120;
const GRID_H = 70;

let bwMode = false;
let running = false;

/* LOAD VIDEO */

loadBtn.onclick = () => {
    fileInput.click();
};

fileInput.onchange = e => {

    const file = e.target.files[0];

    if(!file) return;

    const url =
        URL.createObjectURL(file);

    video.src = url;

    status.innerHTML =
        `VIDEO: ${file.name}<br>
         ASCII GRID: ${GRID_W} × ${GRID_H}<br>
         MODE: ${bwMode ? "B/W" : "TRUE COLOR"}`;

    video.onloadeddata = async () => {

        await video.play();

        seek.max =
            video.duration;

        running = true;

        renderLoop();
    };
};

/* PLAY */

playBtn.onclick = () => {

    if(video.paused){
        video.play();
    }
    else{
        video.pause();
    }
};

/* SEEK */

seek.oninput = () => {
    video.currentTime =
        seek.value;
};

/* BW */

bwBtn.onclick = () => {

    bwMode = !bwMode;

    status.innerHTML =
        status.innerHTML.replace(
            /MODE:.*$/m,
            `MODE: ${bwMode ? "B/W" : "TRUE COLOR"}`
        );
};

/* LOOP */

function renderLoop(){

    if(running){

        renderFrame();

        seek.value =
            video.currentTime;
    }

    requestAnimationFrame(
        renderLoop
    );
}

/* RENDER */

function renderFrame(){

    const off =
        document.createElement("canvas");

    off.width = GRID_W;
    off.height = GRID_H;

    const octx =
        off.getContext("2d");

    octx.drawImage(
        video,
        0,
        0,
        GRID_W,
        GRID_H
    );

    const pixels =
        octx.getImageData(
            0,
            0,
            GRID_W,
            GRID_H
        ).data;

    ctx.fillStyle = "black";
    ctx.fillRect(
        0,
        0,
        canvas.width,
        canvas.height
    );

    const cw =
        density.value * 0.8;

    const ch =
        density.value * 1.25;

    ctx.font =
        `${ch}px monospace`;

    ctx.textBaseline =
        "top";

    for(let y=0;y<GRID_H;y++){

        for(let x=0;x<GRID_W;x++){

            const i =
                (y * GRID_W + x) * 4;

            let r =
                pixels[i];

            let g =
                pixels[i+1];

            let b =
                pixels[i+2];

            if(bwMode){

                const gray =
                    (r+g+b)/3;

                r = gray;
                g = gray;
                b = gray;
            }

            const bright =
                (r+g+b)/3;

            const index =
                Math.floor(
                    bright / 255 *
                    (chars.length-1)
                );

            const c =
                chars[index];

            ctx.fillStyle =
                `rgb(${r},${g},${b})`;

            ctx.fillText(
                c,
                x * cw,
                y * ch
            );
        }
    }
}

</script>

</body>
</html>
